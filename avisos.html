<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Publicar Aviso | Moisés Sáenz #2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #004aad;
            --primary-dark: #003580;
            --glass: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background: linear-gradient(-45deg, #004aad, #00c6ff, #0072ff, #00c6ff);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .header-app {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; max-width: 500px; color: white; margin-bottom: 20px;
        }

        .btn-back { background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .btn-back:hover { background: rgba(255,255,255,0.3); }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        h2 { color: var(--primary); font-weight: 800; margin: 0 0 5px; font-size: 22px; text-align: center; }
        .subtitle { color: #64748b; font-size: 13px; text-align: center; margin-bottom: 20px; display: block; }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 800; color: var(--primary); margin-left: 5px; text-transform: uppercase; }
        
        input, textarea {
            width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(0,0,0,0.1);
            background: white; font-size: 15px; outline: none; margin-top: 5px; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 74, 173, 0.1); }

        .drop-zone {
            width: 100%; border: 2px dashed rgba(0, 74, 173, 0.3);
            border-radius: 20px; padding: 30px; text-align: center;
            color: var(--primary); cursor: pointer; background: rgba(255,255,255,0.5);
            margin: 15px 0; transition: 0.3s;
        }
        .drop-zone:hover { border-color: var(--primary); background: white; }
        .drop-zone.active { border-color: #059669; background: #f0fdf4; }

        .btn-publish {
            width: 100%; padding: 18px; background: var(--primary); color: white;
            border: none; border-radius: 16px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 16px; transition: 0.3s;
        }
        .btn-publish:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-publish:disabled { background: #94a3b8; }

        .preview-img { width: 100%; border-radius: 15px; margin-top: 15px; display: none; object-fit: cover; max-height: 250px; border: 2px solid white; }
        .hidden { display: none; }
        :root {
    --primary: #004aad;
    --text: #1e293b;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #f1f5f9;
}

/* Colores cuando el modo oscuro está activo */
body.dark-mode {
    --bg: #0f172a;
    --text: #f1f5f9;
    --card: #1e293b;
    --border: #334155;
}

body {
    background-color: var(--bg);
    color: var(--text);
    transition: background 0.3s, color 0.3s;
}
    </style>
</head>
<body>

    <div class="header-app">
        <button class="btn-back" onclick="window.location.href='inicio.html'">
            <i data-lucide="arrow-left"></i>
        </button>
        <h1 style="font-size: 18px; font-weight: 800; margin: 0;">Panel de Comunicación</h1>
        <div style="width:40px;"></div>
    </div>

    <div class="glass-card">
        <h2>Crear Aviso</h2>
        <span class="subtitle">La comunidad educativa recibirá esta notificación</span>
        
        <form id="avisoForm">
            <div class="input-group">
                <label>Título del Mensaje</label>
                <input type="text" id="aviso-titulo" placeholder="Ej: Entrega de Boletas 1er Trimestre" required>
            </div>

            <div class="input-group">
                <label>Descripción Completa</label>
                <textarea id="aviso-desc" rows="4" placeholder="Indique horarios, requisitos o avisos importantes..." required></textarea>
            </div>

            <div class="input-group">
                <label>Enlace de Interés (Opcional)</label>
                <input type="url" id="aviso-link" placeholder="https://facebook.com/escuela/post1">
            </div>

            <div class="drop-zone" id="drop-zone">
                <div id="drop-zone-content">
                    <i data-lucide="image-plus" style="margin-bottom: 8px; width: 32px; height: 32px;"></i>
                    <p style="margin:0; font-size:14px; font-weight:700;">Subir Imagen Ilustrativa</p>
                    <p style="margin:5px 0 0; font-size:11px; opacity: 0.7;">Formatos: JPG, PNG • Máximo 2MB</p>
                </div>
                <input type="file" id="file-input" accept="image/*" class="hidden">
                <img id="img-preview" class="preview-img">
            </div>

            <button type="submit" class="btn-publish" id="btn-submit">
                <i data-lucide="send"></i>
                Publicar Ahora
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-trG4y0yS3ldkZwcOY0Ar-s_aCt1VE-8",
            authDomain: "escuelasecundariageneralno2.firebaseapp.com",
            projectId: "escuelasecundariageneralno2",
            storageBucket: "escuelasecundariageneralno2.firebasestorage.app",
            messagingSenderId: "755206365423",
            appId: "1:755206365423:web:81f6a2335a5ce8bfce3b1a"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getFirestore(app);
        lucide.createIcons();

        // Seguridad: Solo admin puede publicar
        if(localStorage.getItem('role') !== 'admin') {
            window.location.href = 'incio.html';
        }

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const imgPreview = document.getElementById('img-preview');
        const dropZoneContent = document.getElementById('drop-zone-content');
        let selectedFile = null;

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                if(selectedFile.size > 2 * 1024 * 1024) {
                    Swal.fire('Imagen muy grande', 'Por favor usa una imagen menor a 2MB.', 'warning');
                    fileInput.value = "";
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imgPreview.src = ev.target.result;
                    imgPreview.style.display = 'block';
                    dropZoneContent.style.display = 'none';
                    dropZone.classList.add('active');
                };
                reader.readAsDataURL(selectedFile);
            }
        };

        document.getElementById('uploadForm' || 'avisoForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            
            Swal.fire({ 
                title: 'Procesando Aviso', 
                text: 'Subiendo datos e imagen...',
                allowOutsideClick: false, 
                didOpen: () => Swal.showLoading() 
            });

            try {
                let imgUrl = "";
                if(selectedFile) {
                    // Nombre de archivo único para evitar sobreescritura
                    const sRef = ref(storage, `avisos/img_${Date.now()}.jpg`);
                    await uploadBytes(sRef, selectedFile);
                    imgUrl = await getDownloadURL(sRef);
                }

                // Usamos addDoc para crear un nuevo registro cada vez en la colección "avisos"
                await addDoc(collection(db, "avisos"), {
                    titulo: document.getElementById('aviso-titulo').value.trim(),
                    descripcion: document.getElementById('aviso-desc').value.trim(),
                    link: document.getElementById('aviso-link').value.trim(),
                    imagen: imgUrl,
                    fecha: new Date().toLocaleDateString('es-MX'),
                    timestamp: serverTimestamp(), // Útil para ordenar por el más reciente
                    autor: localStorage.getItem('nombre') || 'Administración'
                });

                Swal.fire({
                    icon: 'success',
                    title: '¡Publicado!',
                    text: 'El aviso se ha enviado correctamente.',
                    confirmButtonColor: '#004aad'
                }).then(() => window.location.href = 'inicio.html');

            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'No se pudo conectar con la base de datos.', 'error');
                btn.disabled = false;
            }
        };
        // Función para aplicar el tema guardado al cargar la página
function aplicarTemaGuardado() {
    const temaRecuperado = localStorage.getItem('theme');
    if (temaRecuperado === 'dark') {
        document.body.classList.add('dark-mode');
        // Si estás en la página de ajustes, asegúrate de que el switch se vea marcado
        const toggle = document.getElementById('dark-mode-toggle');
        if (toggle) toggle.checked = true;
    }
}

// Ejecutar automáticamente al abrir cualquier página
aplicarTemaGuardado();
    </script>
</body>
</html>
