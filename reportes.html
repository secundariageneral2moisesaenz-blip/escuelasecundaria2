<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora de Reportes | Moisés Sáenz #2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #004aad;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #1e293b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; background: #f8fafc; color: var(--text); padding: 20px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        .header {
            text-align: center; margin-bottom: 30px;
        }
        .header h1 { color: var(--primary); font-weight: 800; font-size: 24px; margin-bottom: 5px; }
        
        /* Buscador */
        .search-box {
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 25px;
            display: flex; gap: 10px;
        }
        .search-box input {
            flex: 1; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none; font-weight: 600;
        }
        .btn-search {
            background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer;
        }

        /* Tarjeta de Reporte */
        .report-card {
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px;
            border-left: 6px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .report-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .report-date { font-size: 12px; color: #94a3b8; font-weight: 700; }
        .report-severity { font-size: 10px; padding: 4px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; }
        
        /* Colores por gravedad */
        .sev-leve { background: #dcfce7; color: #166534; }
        .sev-grave { background: #fee2e2; color: #991b1b; }
        .sev-citatorio { background: #fef9c3; color: #854d0e; }

        .report-body h3 { margin: 0; font-size: 16px; color: var(--primary); }
        .report-body p { margin: 8px 0; font-size: 14px; line-height: 1.4; color: #475569; }
        .report-footer { font-size: 12px; font-style: italic; color: #64748b; border-top: 1px solid #f1f5f9; padding-top: 10px; margin-top: 10px; }

        .empty-state { text-align: center; padding: 40px; color: #94a3b8; }
        .back-nav { margin-bottom: 20px; display: block; text-decoration: none; color: var(--primary); font-weight: 700; font-size: 14px; }
        :root {
    --primary: #004aad;
    --text: #1e293b;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #f1f5f9;
}

/* Colores cuando el modo oscuro está activo */
body.dark-mode {
    --bg: #0f172a;
    --text: #f1f5f9;
    --card: #1e293b;
    --border: #334155;
}

body {
    background-color: var(--bg);
    color: var(--text);
    transition: background 0.3s, color 0.3s;
}
    </style>
</head>
<body>

<div class="container">
    <a href="inicio.html" class="back-nav"><i data-lucide="arrow-left" style="width:16px; vertical-align:middle;"></i> Volver al Portal</a>
    
    <div class="header">
        <h1>Bitácora Escolar</h1>
        <p style="color: #64748b; font-size: 14px;">Consulta de incidencias y reportes disciplinarios</p>
    </div>

    <div class="search-box">
        <input type="text" id="inputCURP" placeholder="Ingresa CURP del alumno..." maxlength="18">
        <button class="btn-search" onclick="buscarReportes()"><i data-lucide="search"></i></button>
    </div>

    <div id="results-container">
        <div class="empty-state">
            <i data-lucide="clipboard-list" size="48" style="margin-bottom:10px; opacity:0.5;"></i>
            <p>Ingresa un CURP para ver el historial.</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCSsx1Nxl-0GKN4K6vOFezgamaqMdUG_L0",
  authDomain: "secundariageneral2-74619.firebaseapp.com",
  projectId: "secundariageneral2-74619",
  storageBucket: "secundariageneral2-74619.firebasestorage.app",
  messagingSenderId: "1038763201775",
  appId: "1:1038763201775:web:43418612280aa19fb2f71a",
  measurementId: "G-M5BZ2P5RFD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    lucide.createIcons();

    window.buscarReportes = async function() {
        const curp = document.getElementById('inputCURP').value.trim().toUpperCase();
        const container = document.getElementById('results-container');

        if (!curp) {
            Swal.fire('Atención', 'Escribe un CURP', 'warning');
            return;
        }

        container.innerHTML = '<div class="empty-state">Buscando reportes...</div>';

        try {
            // Buscamos en la colección "reportes" filtrando por el CURP del alumno
            const q = query(
                collection(db, "reportes"), 
                where("alumnoCurp", "==", curp),
                orderBy("fecha_raw", "desc") // Ordenar por fecha más reciente
            );

            const querySnapshot = await getDocs(q);
            container.innerHTML = '';

            if (querySnapshot.empty) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="check-circle" size="48" style="color:#22c55e; margin-bottom:10px;"></i>
                        <p>El alumno no cuenta con reportes registrados.</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = 'report-card';
                
                // Definir color según gravedad
                let sevClass = 'sev-leve';
                if(data.gravedad === 'grave') sevClass = 'sev-grave';
                if(data.gravedad === 'citatorio') sevClass = 'sev-citatorio';

                card.innerHTML = `
                    <div class="report-header">
                        <span class="report-date">${data.fecha || 'Sin fecha'}</span>
                        <span class="report-severity ${sevClass}">${data.gravedad || 'Reporte'}</span>
                    </div>
                    <div class="report-body">
                        <h3>${data.motivo || 'Incidencia escolar'}</h3>
                        <p>${data.descripcion}</p>
                    </div>
                    <div class="report-footer">
                        Reportado por: ${data.maestro || 'Personal Escolar'}
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();

        } catch (error) {
            console.error(error);
            container.innerHTML = '<div class="empty-state" style="color:#ef4444;">Error al cargar los datos. Asegúrate de tener permisos.</div>';
        }
    };
    // Función para aplicar el tema guardado al cargar la página
function aplicarTemaGuardado() {
    const temaRecuperado = localStorage.getItem('theme');
    if (temaRecuperado === 'dark') {
        document.body.classList.add('dark-mode');
        // Si estás en la página de ajustes, asegúrate de que el switch se vea marcado
        const toggle = document.getElementById('dark-mode-toggle');
        if (toggle) toggle.checked = true;
    }
}

// Ejecutar automáticamente al abrir cualquier página
aplicarTemaGuardado();
</script>
</body>
</html>
