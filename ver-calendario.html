<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calendario Escolar | Moisés Sáenz #2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #004aad;
            --accent: #00c6ff;
            --glass: rgba(255, 255, 255, 0.98);
            --text: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background: #f1f5f9; /* Fondo sólido para mejorar rendimiento en móviles */
            background-image: linear-gradient(-45deg, #004aad, #0072ff);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }

        .header-app {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; max-width: 600px; color: white; margin-bottom: 20px;
        }

        .btn-back { background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px; border-radius: 14px; cursor: pointer; }

        .glass-card {
            background: var(--glass);
            border-radius: 32px;
            padding: 25px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .calendar-container {
            width: 100%;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            margin: 20px 0;
            position: relative;
            cursor: zoom-in;
        }

        .calendar-viewer {
            width: 100%;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-viewer img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Indicador de carga mejorado */
        .loader-wrapper { text-align: center; color: var(--primary); }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .action-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 14px; border-radius: 16px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 8px; text-decoration: none;
            font-size: 13px; transition: 0.2s; border: none;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-light { background: #f1f5f9; color: var(--primary); }
        .btn:active { transform: scale(0.96); }

        .legend-box {
            display: flex; justify-content: center; gap: 15px; 
            margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #64748b; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        .hidden { display: none !important; }
        :root {
    --primary: #004aad;
    --text: #1e293b;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #f1f5f9;
}

/* Colores cuando el modo oscuro está activo */
body.dark-mode {
    --bg: #0f172a;
    --text: #f1f5f9;
    --card: #1e293b;
    --border: #334155;
}

body {
    background-color: var(--bg);
    color: var(--text);
    transition: background 0.3s, color 0.3s;
}
    </style>
</head>
<body>

    <div class="header-app">
        <button class="btn-back" onclick="window.location.href='inicio.html'">
            <i data-lucide="chevron-left"></i>
        </button>
        <h1 style="font-size: 18px; font-weight: 800; margin: 0;">Calendario Escolar</h1>
        <div style="width:40px;"></div>
    </div>

    <div class="glass-card">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <h2 style="margin:0; font-size: 20px; color: var(--primary); font-weight: 800;">Ciclo 2025 - 2026</h2>
                <p style="font-size: 13px; color: #64748b; margin: 4px 0;">Documento oficial SEP</p>
            </div>
            <i data-lucide="calendar-days" color="#004aad"></i>
        </div>

        <div class="calendar-container" id="container">
            <div id="loader" class="calendar-viewer">
                <div class="loader-wrapper">
                    <div class="spinner"></div>
                    <p style="font-size: 12px; font-weight: 600;">Sincronizando...</p>
                </div>
            </div>
            <div class="calendar-viewer">
                <img id="img-calendario" class="hidden" src="" alt="Calendario Oficial" onclick="openFullscreen(this.src)">
            </div>
        </div>

        <div class="legend-box">
            <div class="legend-item"><span class="dot" style="background: #ef4444;"></span> Suspensión</div>
            <div class="legend-item"><span class="dot" style="background: #eab308;"></span> CTE</div>
            <div class="legend-item"><span class="dot" style="background: #22c55e;"></span> Inicio</div>
        </div>

        <div class="action-bar">
            <a id="download-link" href="#" target="_blank" class="btn btn-primary hidden">
                <i data-lucide="download" size="18"></i> Guardar
            </a>
            <button id="btn-full" class="btn btn-light hidden" onclick="openFullscreen(document.getElementById('img-calendario').src)">
                <i data-lucide="maximize" size="18"></i> Pantalla completa
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSsx1Nxl-0GKN4K6vOFezgamaqMdUG_L0",
  authDomain: "secundariageneral2-74619.firebaseapp.com",
  projectId: "secundariageneral2-74619",
  storageBucket: "secundariageneral2-74619.firebasestorage.app",
  messagingSenderId: "1038763201775",
  appId: "1:1038763201775:web:43418612280aa19fb2f71a",
  measurementId: "G-M5BZ2P5RFD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        lucide.createIcons();

        // Función para ver en grande
        window.openFullscreen = (url) => {
            window.open(url, '_blank');
        };

        const imgCal = document.getElementById('img-calendario');
        const loader = document.getElementById('loader');
        const btnDown = document.getElementById('download-link');
        const btnFull = document.getElementById('btn-full');

        onSnapshot(doc(db, "config_escolar", "calendario_oficial"), (docSnap) => {
            if (docSnap.exists()) {
                const url = docSnap.data().url;
                imgCal.src = url;
                imgCal.onload = () => {
                    imgCal.classList.remove('hidden');
                    loader.classList.add('hidden');
                    btnDown.classList.remove('hidden');
                    btnFull.classList.remove('hidden');
                    btnDown.href = url;
                };
            } else {
                loader.innerHTML = "<p style='font-size:14px; color:#64748b;'>El calendario se publicará próximamente.</p>";
            }
        });
        // Función para aplicar el tema guardado al cargar la página
function aplicarTemaGuardado() {
    const temaRecuperado = localStorage.getItem('theme');
    if (temaRecuperado === 'dark') {
        document.body.classList.add('dark-mode');
        // Si estás en la página de ajustes, asegúrate de que el switch se vea marcado
        const toggle = document.getElementById('dark-mode-toggle');
        if (toggle) toggle.checked = true;
    }
}

// Ejecutar automáticamente al abrir cualquier página
aplicarTemaGuardado();
    </script>
</body>
</html>
