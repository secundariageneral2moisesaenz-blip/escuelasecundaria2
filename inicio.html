<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#004aad">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Moisés Sáenz">
    
    <title>Inicio | Moisés Sáenz #2</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #004aad;
            --primary-light: #00c6ff;
            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text: #1e293b;
            --text-light: #64748b;
            --danger: #ef4444;
            --danger-light: #fee2e2;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background: linear-gradient(-45deg, #004aad, #00c6ff, #0072ff, #00c6ff);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .page-content { display: none; animation: slideUp 0.4s ease; padding-bottom: 120px; }
        .page-content.active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .top-bar { padding: 20px; display: flex; justify-content: space-between; align-items: center; color: white; max-width: 600px; margin: 0 auto; }
        .feed-container { max-width: 500px; margin: 0 auto; padding: 0 20px; }
        
        /* --- MEJORA DISEÑO DE AVISOS --- */
        .aviso-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 32px; 
            padding: 24px; 
            margin-bottom: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInCard 0.5s ease backwards;
        }
        @keyframes fadeInCard { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .aviso-card:hover { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(0,0,0,0.15); }
        
        .aviso-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .aviso-tag { 
            background: rgba(0, 74, 173, 0.1);
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 10px; 
            font-weight: 800; 
            color: var(--primary); 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        .aviso-fecha { font-size: 11px; color: var(--text-light); font-weight: 600; }
        .aviso-titulo { font-size: 22px; font-weight: 800; margin: 0 0 10px 0; color: #0f172a; line-height: 1.2; }
        .aviso-desc { font-size: 15px; line-height: 1.6; color: #475569; margin-bottom: 15px; }
        
        .aviso-card img { 
            width: calc(100% + 10px); 
            margin-left: -5px;
            border-radius: 22px; 
            margin-top: 5px; 
            object-fit: cover; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* --- BANNER PWA --- */
        #pwa-install-banner {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: var(--primary);
            color: white;
            padding: 15px 20px;
            border-radius: 20px;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.5s ease;
        }
        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }
        .install-btn {
            background: white;
            color: var(--primary);
            border: none;
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 12px;
        }

        .profile-avatar { width: 80px; height: 80px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 32px; font-weight: 800; box-shadow: 0 10px 20px rgba(0,74,173,0.2); }
        
        .contact-btn { 
            display: flex; align-items: center; gap: 15px; 
            background: white; padding: 18px; border-radius: 20px; 
            margin-bottom: 12px; text-decoration: none; color: var(--text); 
            font-weight: 600; border: 1px solid #f1f5f9;
            transition: all 0.2s;
        }
        .contact-btn:active { background: #f8fafc; transform: translateX(5px); }

        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.95);
            border-radius: 30px; display: flex; justify-content: space-around;
            padding: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-light); font-size: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }
        .nav-item i { margin-bottom: 4px; transition: 0.3s; }

        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; max-width: 300px; height: 100%; background: white; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px 20px; box-shadow: 20px 0 50px rgba(0,0,0,0.1); }
        .sidebar.active { left: 0; }
        .sidebar-header { padding-bottom: 20px; border-bottom: 1px solid #f1f5f9; margin-bottom: 20px; }
        .sidebar-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 15px; color: #475569; text-decoration: none; font-weight: 600; margin-bottom: 8px; transition: 0.2s; }
        .sidebar-item:active { background: #f1f5f9; color: var(--primary); }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1999; display: none; opacity: 0; transition: 0.3s; }
        .overlay.active { display: block; opacity: 1; }

        .logout-btn { width: 100%; padding: 16px; border-radius: 18px; border: none; background: var(--danger-light); color: var(--danger); font-weight: 800; cursor: pointer; transition: 0.2s; }
        .logout-btn:active { transform: scale(0.95); opacity: 0.8; }
        
        body.dark-mode {
            --bg: #0f172a;
            --text: #f1f5f9;
            --card: #1e293b;
            --border: #334155;
        }

        body { transition: background 0.3s, color 0.3s; }
        .nav-item, .sidebar-item {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .nav-item:active {
            transform: scale(0.9);
            background: rgba(0, 74, 173, 0.1);
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div id="pwa-install-banner">
        <span style="font-size: 13px; font-weight: 600;">📱 Instalar App Moisés Sáenz</span>
        <button class="install-btn" id="btn-install-now">INSTALAR</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 style="margin:0; font-size: 18px; color: var(--primary);">Menú Escolar</h2>
            <p id="user-role-display" style="margin:5px 0 0; font-size: 11px; text-transform: uppercase; font-weight: 800; color: var(--text-light);"></p>
        </div>
        <div id="nav-tools"></div>
    </div>

    <div id="page-home" class="page-content active">
        <div class="top-bar">
            <div>
                <h1 style="margin:0; font-size: 24px; font-weight: 800;">Moisés Sáenz</h1>
                <p style="margin:0; font-size: 12px; opacity: 0.8;">Portal de Avisos</p>
            </div>
            <button onclick="toggleMenu()" style="background:none; border:none; color:white; cursor:pointer;" aria-label="Abrir menú">
                <i data-lucide="menu" style="width: 32px; height: 32px;"></i>
            </button>
        </div>
        <div class="feed-container">
            <h2 style="color: white; font-size: 16px; margin: 20px 0; font-weight: 600;">Avisos Recientes</h2>
            <div id="avisos-feed">
                <div class="aviso-card" style="opacity: 0.5;"><p>Cargando avisos...</p></div>
            </div>
        </div>
    </div>

    <div id="page-contact" class="page-content">
        <div class="top-bar"><h1 style="font-weight:800; margin:0;">Contacto</h1></div>
        <div class="feed-container">
            <div class="aviso-card">
                <p class="aviso-tag" style="margin-bottom:15px;">Canales Oficiales</p>
                <a href="tel:6441234567" class="contact-btn"><i data-lucide="phone"></i> Llamar a Dirección</a>
                <a href="mailto:escuela@correo.com" class="contact-btn"><i data-lucide="mail"></i> Enviar Correo</a>
                <a href="https://facebook.com" target="_blank" class="contact-btn"><i data-lucide="facebook"></i> Facebook Oficial</a>
            </div>
        </div>
    </div>

    <div id="page-profile" class="page-content">
        <div class="top-bar"><h1 style="font-weight:800; margin:0;">Mi Perfil</h1></div>
        <div class="feed-container">
            <div class="aviso-card" style="text-align: center;">
                <div class="profile-avatar" id="avatar-char">U</div>
                <h2 id="profile-name" style="margin: 5px 0; color: var(--primary);">Usuario</h2>
                <p id="profile-role" style="color: var(--text-light); font-weight: 700; margin-bottom: 25px; font-size: 13px;">ROL</p>
                <button onclick="cerrarSesion()" class="logout-btn">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('home', this)">
            <i data-lucide="home"></i><span>Inicio</span>
        </div>
        <div class="nav-item" onclick="toggleMenu()">
            <i data-lucide="grid"></i><span>Menú</span>
        </div>
        <div class="nav-item" onclick="window.location.href='contacto.html'">
            <i data-lucide="phone"></i><span>Contacto</span>
        </div>
        <div class="nav-item" onclick="window.location.href='perfil.html'">
            <i data-lucide="user"></i><span>Perfil</span>
        </div>
        <div class="nav-item" onclick="window.location.href='ajustes.html'">
            <i data-lucide="settings"></i><span>Ajustes</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-trG4y0yS3ldkZwcOY0Ar-s_aCt1VE-8",
            authDomain: "escuelasecundariageneralno2.firebaseapp.com",
            projectId: "escuelasecundariageneralno2",
            storageBucket: "escuelasecundariageneralno2.firebasestorage.app",
            messagingSenderId: "755206365423",
            appId: "1:755206365423:web:81f6a2335a5ce8bfce3b1a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        lucide.createIcons();

        const userName = localStorage.getItem('nombre') || 'Estudiante';
        const userRole = localStorage.getItem('role') || 'alumno';
        
        document.getElementById('user-role-display').innerText = `Acceso: ${userRole}`;
        document.getElementById('profile-name').innerText = userName;
        document.getElementById('profile-role').innerText = userRole.toUpperCase();
        document.getElementById('avatar-char').innerText = userName.charAt(0).toUpperCase();

        window.switchPage = function(page, el) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            if(el) el.classList.add('active');
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        const tools = [
            { id: 'avisos', title: 'Publicar Aviso', icon: 'megaphone', roles: ['admin'] },
            { id: 'archivos', title: 'Gestión de Archivos', icon: 'upload-cloud', roles: ['admin'] },
            { id: 'bitacora', title: 'Bitácora Digital', icon: 'book-text', roles: ['admin'] },
            { id: 'boletas', title: 'Control de Boletas', icon: 'file-check', roles: ['admin'] },
            { id: 'calendario', title: 'Editar Calendario', icon: 'calendar-days', roles: ['admin'] },
            { id: 'credenciales', title: 'Generar Credenciales', icon: 'contact-2', roles: ['admin'] },
            { id: 'becas', title: 'Becas Rita Cetina', icon: 'graduation-cap', roles: ['admin'] },
            { id: 'subir-tareas', title: 'Subir Tareas', icon: 'book-open', roles: ['maestro'] },
            { id: 'publicar-fechas', title: 'Agendar Exámenes', icon: 'clipboard-list', roles: ['maestro'] },
            { id: 'ver-tareas', title: 'Mis Tareas', icon: 'library-big', roles: ['alumno'] },
            { id: 'ver-fechas', title: 'Exámenes y Proy.', icon: 'timer', roles: ['alumno'] },
            { id: 'ver-horario', title: 'Mi Horario', icon: 'calendar', roles: ['alumno'] },
            { id: 'ver-calendario', title: 'Calendario Escolar', icon: 'calendar-days', roles: ['alumno'] },
            { id: 'ver-becas', title: 'Info. de Becas', icon: 'info', roles: ['alumno'] },
            { id: 'chat', title: 'Chat de Grupo', icon: 'messages-square', roles: ['alumno'] },
            { id: 'ver-boletas', title: 'Consultar Boletas', icon: 'file-text', roles: ['padre'] },
            { id: 'reportes', title: 'Reportes de Conducta', icon: 'alert-circle', roles: ['padre'] }
        ];

        const navTools = document.getElementById('nav-tools');
        tools.forEach(tool => {
            if (tool.roles.includes(userRole)) {
                const link = document.createElement('a');
                link.href = `${tool.id}.html`;
                link.className = 'sidebar-item';
                link.innerHTML = `<i data-lucide="${tool.icon}"></i> <span>${tool.title}</span>`;
                navTools.appendChild(link);
            }
        });
        lucide.createIcons();

        const q = query(collection(db, "avisos"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('avisos-feed');
            feed.innerHTML = '';

            if (!snapshot.empty) {
                let delay = 0;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = 'aviso-card';
                    card.style.animationDelay = `${delay}s`;
                    card.innerHTML = `
                        <div class="aviso-header">
                            <span class="aviso-tag">Aviso Escolar</span>
                            <span class="aviso-fecha">${data.fecha || 'Hoy'}</span>
                        </div>
                        <h3 class="aviso-titulo">${data.titulo || 'Sin título'}</h3>
                        <p class="aviso-desc">${data.descripcion || ''}</p>
                        ${data.imagen ? `<img src="${data.imagen}" loading="lazy">` : ''}
                    `;
                    feed.appendChild(card);
                    delay += 0.1;
                });
            } else {
                feed.innerHTML = '<div class="aviso-card"><p style="text-align:center; color:#64748b;">No hay avisos publicados hoy.</p></div>';
            }
        }, (error) => {
            console.error("Error de Firebase:", error);
            document.getElementById('avisos-feed').innerHTML = '<p style="color:white;">Error de permisos o conexión.</p>';
        });

        /* --- LÓGICA DE INSTALACIÓN PWA --- */
        let deferredPrompt;
        const installBanner = document.getElementById('pwa-install-banner');
        const installBtn = document.getElementById('btn-install-now');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'flex';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('Usuario instaló la app');
                }
                deferredPrompt = null;
                installBanner.style.display = 'none';
            }
        });

        window.addEventListener('appinstalled', () => {
            installBanner.style.display = 'none';
            Swal.fire('¡App Instalada!', 'Ya puedes usar el portal desde tu pantalla de inicio.', 'success');
        });

        window.toggleMenu = function() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        };

        window.cerrarSesion = function() {
            Swal.fire({
                title: '¿Cerrar sesión?',
                text: "Tendrás que ingresar tus datos de nuevo.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#004aad',
                cancelButtonColor: '#ef4444',
                confirmButtonText: 'Sí, salir',
                cancelButtonText: 'Cancelar',
                borderRadius: '20px'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.clear();
                    window.location.href = 'index.html';
                }
            });
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW error", err));
        }

        function aplicarTemaGuardado() {
            const temaRecuperado = localStorage.getItem('theme');
            if (temaRecuperado === 'dark') {
                document.body.classList.add('dark-mode');
            }
        }
        aplicarTemaGuardado();
    </script>
</body>
</html>
