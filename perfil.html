<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Moisés Sáenz #2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #004aad;
            --accent: #00c6ff;
            --text: #1e293b;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #f1f5f9;
        }

        /* Colores cuando el modo oscuro está activo */
        body.dark-mode {
            --bg: #0f172a;
            --text: #f1f5f9;
            --card: #1e293b;
            --border: #334155;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .profile-container {
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Tarjeta Principal */
        .profile-card {
            background: var(--card);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .profile-header {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 40px 20px;
            text-align: center;
            color: white;
            position: relative;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            border: 4px solid rgba(255,255,255,0.3);
        }

        .profile-header h2 { margin: 0; font-size: 22px; font-weight: 800; }
        .profile-header p { margin: 5px 0 0; opacity: 0.9; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* Información Detallada */
        .profile-body { padding: 30px; }

        .info-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .info-row i { color: var(--primary); opacity: 0.7; }
        .info-label { font-size: 12px; color: #64748b; font-weight: 700; text-transform: uppercase; display: block; }
        .info-value { font-size: 16px; color: var(--text); font-weight: 600; }

        /* Botones de Acción */
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 30px 30px;
        }

        .btn-profile {
            padding: 12px;
            border-radius: 15px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-edit { background: var(--border); color: var(--text); }
        .btn-logout { background: #fee2e2; color: #ef4444; }
        .btn-profile:hover { transform: translateY(-2px); }

        .back-nav {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #64748b;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="profile-container">
        <a href="inicio.html" class="back-nav">
            <i data-lucide="chevron-left"></i> Volver al Tablero
        </a>

        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-circle">
                    <i data-lucide="user" size="48"></i>
                </div>
                <h2 id="user-name">Cargando...</h2>
                <p id="user-role">Cargando...</p>
            </div>

            <div class="profile-body">
                <div class="info-row">
                    <i data-lucide="mail"></i>
                    <div>
                        <span class="info-label">Correo Electrónico</span>
                        <span class="info-value" id="user-email">Cargando...</span>
                    </div>
                </div>

                <div class="info-row" id="row-academica">
                    <i data-lucide="graduation-cap"></i>
                    <div>
                        <span class="info-label" id="label-academica">Grado y Grupo</span>
                        <span class="info-value" id="user-clase">Cargando...</span>
                    </div>
                </div>

                <div class="info-row">
                    <i data-lucide="shield-check"></i>
                    <div>
                        <span class="info-label">Estado de la cuenta</span>
                        <span class="info-value" id="user-status">Verificado</span>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="btn-profile btn-edit" onclick="editarPerfil()">
                    <i data-lucide="settings"></i> Ajustes
                </button>
                <button class="btn-profile btn-logout" id="btn-cerrar-sesion">
                    <i data-lucide="log-out"></i> Salir
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSsx1Nxl-0GKN4K6vOFezgamaqMdUG_L0",
  authDomain: "secundariageneral2-74619.firebaseapp.com",
  projectId: "secundariageneral2-74619",
  storageBucket: "secundariageneral2-74619.firebasestorage.app",
  messagingSenderId: "1038763201775",
  appId: "1:1038763201775:web:43418612280aa19fb2f71a",
  measurementId: "G-M5BZ2P5RFD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- SOLUCIÓN: Monitorear Estado de Autenticación con Check de LocalStorage ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Si hay usuario en Firebase, cargamos datos
                try {
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        actualizarInterfaz(docSnap.data());
                    } else {
                        usarRespaldoLocalStorage();
                    }
                } catch (error) {
                    console.error("Error al cargar perfil:", error);
                    usarRespaldoLocalStorage();
                }
            } else {
                // SOLO si no hay usuario en Firebase NI en LocalStorage redirigimos
                // Esto evita que el retraso de Firebase te saque si ya estabas logueado
                if (!localStorage.getItem('userEmail')) {
                    window.location.href = 'index.html';
                } else {
                    // Si Firebase no responde pero hay LocalStorage, mostramos el respaldo
                    usarRespaldoLocalStorage();
                }
            }
        });

        function actualizarInterfaz(data) {
            document.getElementById('user-name').innerText = data.nombre || 'Sin nombre';
            document.getElementById('user-email').innerText = data.email || 'Sin correo';
            
            const rol = data.rol || 'alumno';
            document.getElementById('user-role').innerText = rol.toUpperCase();

            if (rol === 'maestro' || rol === 'admin') {
                document.getElementById('label-academica').innerText = "Cargo / Nivel";
                document.getElementById('user-clase').innerText = rol === 'admin' ? "Dirección Administrativa" : "Cuerpo Docente";
            } else {
                const grado = data.grado || '';
                const grupo = data.grupo || '';
                document.getElementById('user-clase').innerText = `${grado}° ${grupo}`;
            }
            lucide.createIcons();
        }

        function usarRespaldoLocalStorage() {
            document.getElementById('user-name').innerText = localStorage.getItem('userName') || 'Usuario';
            document.getElementById('user-email').innerText = localStorage.getItem('userEmail') || '-';
            document.getElementById('user-role').innerText = (localStorage.getItem('role') || 'alumno').toUpperCase();
            
            const grado = localStorage.getItem('userGrado') || '';
            const grupo = localStorage.getItem('userGrupo') || '';
            document.getElementById('user-clase').innerText = grado && grupo ? `${grado}° ${grupo}` : 'No asignado';
            lucide.createIcons();
        }

        // Lógica de Salir (Firebase + LocalStorage)
        document.getElementById('btn-cerrar-sesion').addEventListener('click', () => {
            Swal.fire({
                title: '¿Cerrar sesión?',
                text: "Tendrás que ingresar tus datos de nuevo.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#004aad',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Sí, salir',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    signOut(auth).then(() => {
                        localStorage.clear();
                        window.location.href = 'index.html';
                    });
                }
            });
        });
    </script>

    <script>
        // Funciones de Interfaz
        lucide.createIcons();

        function editarPerfil() {
            Swal.fire({
                title: 'Ajustes de Perfil',
                text: 'La edición de datos personales debe solicitarse en la dirección de la escuela.',
                icon: 'info',
                confirmButtonColor: '#004aad'
            });
        }

        function aplicarTemaGuardado() {
            const temaRecuperado = localStorage.getItem('theme');
            if (temaRecuperado === 'dark') {
                document.body.classList.add('dark-mode');
            }
        }

        aplicarTemaGuardado();
    </script>
</body>
</html>
