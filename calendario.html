<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calendario Escolar | Moisés Sáenz #2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #004aad;
            --glass: rgba(255, 255, 255, 0.9);
            --text: #1e293b;
            --bg: #f1f5f9;
            --card: #ffffff;
            --border: #e2e8f0;
            --preview-bg: #f8fafc;
        }

        /* Colores cuando el modo oscuro está activo */
        body.dark-mode {
            --bg: #0f172a;
            --text: #f1f5f9;
            --glass: rgba(30, 41, 59, 0.95);
            --card: #1e293b;
            --border: #334155;
            --preview-bg: #0f172a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s, color 0.3s;
        }

        .header-app {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; max-width: 500px; color: white; margin-bottom: 20px;
        }

        /* El fondo del header se adapta si es gradiente o color sólido */
        body:not(.dark-mode) {
            background: linear-gradient(135deg, #004aad 0%, #001e4d 100%);
        }

        .btn-back { background: rgba(255,255,255,0.15); border: none; color: white; padding: 12px; border-radius: 16px; cursor: pointer; display: flex; }

        .glass-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border: 1px solid var(--border);
            transition: background 0.3s, border 0.3s;
        }

        .cal-preview {
            width: 100%;
            background: var(--preview-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--border);
            margin: 15px 0;
            position: relative;
            cursor: zoom-in;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cal-preview img { width: 100%; height: auto; display: block; transition: 0.3s; }
        .cal-preview img:hover { opacity: 0.9; }

        .btn-action {
            width: 100%; padding: 16px; border-radius: 18px; border: none;
            font-weight: 800; font-size: 15px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; transition: 0.3s; margin-top: 10px;
        }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 15px -3px rgba(0, 74, 173, 0.3); }
        .btn-admin { background: #1e293b; color: white; }
        body.dark-mode .btn-admin { background: #334155; }
        
        .status-tag { font-size: 11px; background: #dcfce7; color: #166534; padding: 5px 12px; border-radius: 12px; font-weight: 800; }
        
        .hidden { display: none; }
        
        .skeleton {
            background: var(--border);
            background: linear-gradient(90deg, var(--border) 25%, var(--preview-bg) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Estilo para el modal de imagen de SweetAlert */
        .swal-full-image { background: transparent !important; }
    </style>
</head>
<body>

    <div class="header-app">
        <button class="btn-back" onclick="window.location.href='inicio.html'">
            <i data-lucide="chevron-left"></i>
        </button>
        <h1 style="font-size: 18px; font-weight: 800; margin: 0;">Calendario Escolar</h1>
        <div style="width:48px;"></div>
    </div>

    <div class="glass-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <h2 style="margin:0; font-size: 22px; color: var(--primary); font-weight: 800;">2024 - 2025</h2>
            <span class="status-tag" id="status-label">ACTUALIZADO</span>
        </div>
        <p style="color: #64748b; font-size: 14px; margin: 0 0 15px;">Pulsa la imagen para ampliar los detalles.</p>

        <div class="cal-preview" id="cal-container">
            <div id="loader" class="skeleton" style="width:100%; height:250px; border-radius:15px;"></div>
            <img id="cal-img" class="hidden" src="" alt="Calendario" onclick="expandImage(this.src)">
        </div>

        <button class="btn-action btn-primary" id="btn-download" disabled>
            <i data-lucide="external-link"></i>
            Abrir en alta calidad
        </button>
    </div>

    <div class="glass-card hidden" id="admin-panel" style="margin-top: 20px; border: 2px dashed var(--primary);">
        <h3 style="margin: 0 0 10px; font-size: 16px; display: flex; align-items: center; gap: 8px;">
            <i data-lucide="shield-check" size="20"></i> Modo Administrador
        </h3>
        <input type="file" id="file-upload" accept="image/*" class="hidden">
        <button class="btn-action btn-admin" onclick="document.getElementById('file-upload').click()">
            <i data-lucide="upload"></i> Actualizar Imagen
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSsx1Nxl-0GKN4K6vOFezgamaqMdUG_L0",
  authDomain: "secundariageneral2-74619.firebaseapp.com",
  projectId: "secundariageneral2-74619",
  storageBucket: "secundariageneral2-74619.firebasestorage.app",
  messagingSenderId: "1038763201775",
  appId: "1:1038763201775:web:43418612280aa19fb2f71a",
  measurementId: "G-M5BZ2P5RFD"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getFirestore(app);
        lucide.createIcons();

        // Aplicar Tema
        function aplicarTemaGuardado() {
            const temaRecuperado = localStorage.getItem('theme');
            if (temaRecuperado === 'dark') {
                document.body.classList.add('dark-mode');
            }
        }
        aplicarTemaGuardado();

        const role = localStorage.getItem('role');
        const calImg = document.getElementById('cal-img');
        const loader = document.getElementById('loader');
        const btnDownload = document.getElementById('btn-download');

        if(role === 'admin') document.getElementById('admin-panel').classList.remove('hidden');

        window.expandImage = (url) => {
            Swal.fire({
                imageUrl: url,
                imageAlt: 'Calendario Escolar Full',
                showConfirmButton: false,
                showCloseButton: true,
                width: '100%',
                background: 'rgba(0,0,0,0.9)',
                padding: '0',
                customClass: { popup: 'swal-full-image' }
            });
        };

        // Escuchar cambios en tiempo real
        onSnapshot(doc(db, "config_escolar", "calendario_oficial"), (docSnap) => {
            if (docSnap.exists()) {
                const url = docSnap.data().url;
                calImg.src = url;
                calImg.onload = () => {
                    calImg.classList.remove('hidden');
                    loader.classList.add('hidden');
                };
                btnDownload.disabled = false;
                btnDownload.onclick = () => window.open(url, '_blank');
            } else {
                loader.innerHTML = "<p style='color:#64748b; font-weight:600;'>No hay calendario disponible</p>";
                loader.classList.remove('skeleton');
            }
        });

        // Lógica de subida para Admin
        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            Swal.fire({
                title: 'Subiendo...',
                text: 'Actualizando calendario oficial',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                const fileName = `calendario_${Date.now()}.jpg`;
                const storageRef = ref(storage, 'escolar/' + fileName);
                
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);

                await setDoc(doc(db, "config_escolar", "calendario_oficial"), {
                    url: url,
                    updatedAt: new Date(),
                    fileName: fileName
                });

                Swal.fire('¡Listo!', 'Calendario actualizado para todos los usuarios.', 'success');
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'No se pudo subir la imagen.', 'error');
            }
        });
    </script>
</body>
</html>
