<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Moisés Sáenz #2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #004aad;
            --secondary: #00c6ff;
            --glass: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #004aad, #00c6ff, #0072ff, #00c6ff);
            background-size: 400% 400%; animation: gradient 15s ease infinite; padding: 20px;
        }

        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 35px 25px; width: 100%; max-width: 420px; text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.15);
            transition: all 0.5s ease;
        }

        .logo-escuela { width: 90px; margin-bottom: 10px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        h2 { color: var(--primary); font-weight: 800; margin: 0; font-size: 24px; }
        p { color: #475569; font-size: 14px; margin-bottom: 25px; }

        .input-group { margin-bottom: 12px; text-align: left; }
        
        input, select {
            width: 100%; padding: 15px; border-radius: 14px; border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.5); font-size: 16px; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(0, 74, 173, 0.1); }

        .btn-primary {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 14px; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        .btn-primary:active { transform: scale(0.96); }

        .links-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .link-item { color: var(--primary); text-decoration: none; font-size: 13px; font-weight: 700; cursor: pointer; }
        .divider { height: 1px; background: rgba(0,0,0,0.08); margin: 15px 0; }
        
        .hidden { display: none; }

        .swal2-popup { border-radius: 20px !important; font-family: 'Plus Jakarta Sans', sans-serif !important; }

        /* Estilo para imágenes del tutorial */
        .img-tutorial {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .img-tutorial {
    width: 100%;
    max-width: 280px;
    height: 180px;
    object-fit: cover;
    border-radius: 20px;
    margin-bottom: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
.swal2-html-container p {
    font-size: 15px;
    line-height: 1.5;
    color: #475569;
}
    </style>
</head>
<body>

    <div class="glass-card" id="main-card">
        <img src="ESCGM2.jpg" alt="Logo" class="logo-escuela">
        <h2 id="form-title">Portal Escolar</h2>
        <p id="form-desc">Secundaria General No. #2 Moisés Saénz</p>
        
        <form id="authForm">
            <div id="reg-fields" class="hidden">
                <div class="input-group">
                    <select id="user-role">
                        <option value="alumno">Soy Alumno</option>
                        <option value="maestro">Soy Maestro</option>
                        <option value="padre">Soy Padre de Familia</option>
                    </select>
                </div>
                <div class="input-group">
                    <input type="text" id="fullname" placeholder="Nombre completo">
                </div>
                <div id="alumno-fields">
                    <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                        <select id="grado">
                            <option value="">Grado</option>
                            <option value="1">1°</option>
                            <option value="2">2°</option>
                            <option value="3">3°</option>
                        </select>
                        <input type="text" id="grupo" placeholder="Grupo" maxlength="1" style="text-transform: uppercase;">
                    </div>
                </div>
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Correo electrónico" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Contraseña" required>
            </div>
            
            <button type="submit" id="main-btn" class="btn-primary">Iniciar Sesión</button>
        </form>

        <div class="links-container">
            <span class="link-item" id="btn-show-forgot">¿Olvidaste tu contraseña?</span>
            <div class="divider"></div>
            <span class="link-item" id="btn-toggle">¿No tienes cuenta? Regístrate aquí</span>
        </div>
    </div>

    <div class="glass-card hidden" id="forgot-card">
        <h2>Recuperar</h2>
        <p>Enviaremos un enlace a tu correo para restablecer tu acceso.</p>
        <div class="input-group">
            <input type="email" id="recover-email" placeholder="Correo de recuperación">
        </div>
        <button class="btn-primary" id="btn-send-recover">Enviar Enlace</button>
        <div class="links-container">
            <span class="link-item" id="btn-back-login">Volver al inicio</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
           apiKey: "AIzaSyCSsx1Nxl-0GKN4K6vOFezgamaqMdUG_L0",
  authDomain: "secundariageneral2-74619.firebaseapp.com",
  projectId: "secundariageneral2-74619",
  storageBucket: "secundariageneral2-74619.firebasestorage.app",
  messagingSenderId: "1038763201775",
  appId: "1:1038763201775:web:43418612280aa19fb2f71a",
  measurementId: "G-M5BZ2P5RFD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- SALTAR LOGIN SI YA HAY SESIÓN ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "inicio.html";
            }
        });

        let isLogin = true;

        const mainCard = document.getElementById('main-card');
        const forgotCard = document.getElementById('forgot-card');

        document.getElementById('btn-toggle').addEventListener('click', () => {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "Portal Escolar" : "Crear Cuenta";
            document.getElementById('main-btn').innerText = isLogin ? "Iniciar Sesión" : "Finalizar Registro";
            document.getElementById('btn-toggle').innerText = isLogin ? "¿No tienes cuenta? Regístrate aquí" : "Ya tengo cuenta. Entrar";
            document.getElementById('reg-fields').classList.toggle('hidden', isLogin);
            document.getElementById('btn-show-forgot').classList.toggle('hidden', !isLogin);
        });

        document.getElementById('user-role').addEventListener('change', (e) => {
            document.getElementById('alumno-fields').classList.toggle('hidden', e.target.value !== 'alumno');
        });

        document.getElementById('btn-show-forgot').addEventListener('click', () => {
            mainCard.classList.add('hidden');
            forgotCard.classList.remove('hidden');
        });

        document.getElementById('btn-back-login').addEventListener('click', () => {
            forgotCard.classList.add('hidden');
            mainCard.classList.remove('hidden');
        });

        document.getElementById('btn-send-recover').addEventListener('click', async () => {
            const email = document.getElementById('recover-email').value;
            if(!email) return Swal.fire('Atención', 'Ingresa tu correo institucional', 'warning');
            try {
                await sendPasswordResetEmail(auth, email);
                Swal.fire('¡Enviado!', 'Revisa tu bandeja de entrada o spam.', 'success');
                document.getElementById('btn-back-login').click();
            } catch (e) {
                Swal.fire('Error', 'No pudimos encontrar ese correo.', 'error');
            }
        });

        async function mostrarTutorial(rol, nombre) {
    const primerNombre = nombre.split(' ')[0];
    const swalConfig = {
        confirmButtonColor: '#004aad',
        confirmButtonText: 'Siguiente',
        padding: '2em',
        color: '#1e293b',
        backdrop: `rgba(0, 74, 173, 0.6)`,
        allowOutsideClick: false,
        showClass: { popup: 'animate__animated animate__fadeInUp' }
    };

    // Paso 1: Bienvenida General
    await Swal.fire({
        ...swalConfig,
        title: `¡Hola, ${primerNombre}! 👋`,
        html: `
            <img src="bienvenidos.png" class="img-tutorial">
            <p>Bienvenido al <b>Portal Digital</b> de la Moisés Sáenz #2. Vamos a darte un recorrido rápido para que aproveches tu cuenta.</p>
        `
    });

    // Pasos específicos por Rol
    if (rol === 'admin') {
        const pasosAdmin = [
            { t: 'Navegar por el inicio', d: 'Explora la barra de navegación y usa las diferentes secciones que tienes.', img: 'inicio.jpeg' },
            { t: 'Publicar Avisos', d: 'Usa el ícono de megáfono para enviar avisos masivos a toda la comunidad escolar.', img: 'aviso.jpeg' },
            { t: 'Gestión de Archivos', d: 'Sube documentos, boletas y reglamentos en la nube para que estén siempre disponibles.', img: 'archivo.jpeg' },
            { t: 'Control de Alumnos', d: 'Desde el menu busca la sección boletas y publica boletas de los estudiantes.', img: 'boletas.jpeg' },
            { t: 'Bitacora', d: 'Gestiona y genera reportes,avisos esolares citatorios de padres y mas.', img: 'bitacora.jpeg' }
        ];
        for (let paso of pasosAdmin) {
            await Swal.fire({ ...swalConfig, title: paso.t, html: `<img src="img/tutorial/${paso.img}" class="img-tutorial"><p>${paso.d}</p>` });
        }
    } 
    
    else if (rol === 'maestro') {
        const pasosMaestro = [
            { t: 'Navegar por el inicio', d: 'Explora la barra de navegación y usa las diferentes secciones que tienes.', img: 'inicio.jpeg' },
            { t: 'Subir Tareas', d: 'Publica tareas para que tus alumnos los vean al instante.', img: 'subir.jpg' },
            { t: 'Agendar Exámenes', d: 'Usa el calendario para fijar fechas de evaluaciones y evitar que se encimen con otras.', img: 'fechas.jpg' },
        ];
        for (let paso of pasosMaestro) {
            await Swal.fire({ ...swalConfig, title: paso.t, html: `<img src="img/tutorial/${paso.img}" class="img-tutorial"><p>${paso.d}</p>` });
        }
    } 
    
    else if (rol === 'alumno') {
        const pasosAlumno = [
            { t: 'Navegar por el inicio', d: 'Explora la barra de navegación y usa las diferentes secciones que tienes.', img: 'inicio.jpeg' },
            { t: 'Tus Tareas', d: 'Revisa diariamente la sección de "Mis Tareas" para no perder ninguna entrega.', img: 'tareas.jpg' },
            { t: 'Exámenes y Proyectos', d: 'Consulta el calendario de evaluaciones para organizar mejor tus estudios.', img: 'examenes.jpg' },
            { t: 'Chat de Grupo', d: 'Platica con los de tu grupo graba audios manda imagenes y mas.', img: 'chat.jpg' },
            { t: 'Horario Escolar', d: 'Ten siempre a la mano tu horario de clases y materias del día.', img: 'horario.jpg' }
        ];
        for (let paso of pasosAlumno) {
            await Swal.fire({ ...swalConfig, title: paso.t, html: `<img src="img/tutorial/${paso.img}" class="img-tutorial"><p>${paso.d}</p>` });
        }
    } 
    
    else if (rol === 'padre') {
        const pasosPadre = [
            { t: 'Navegar por el inicio', d: 'Explora la barra de navegación y usa las diferentes secciones que tienes.', img: 'inicio.jpeg' },
            { t: 'Consultar Boletas', d: 'Visualiza las calificaciones actualizadas de su hijo desde la comodidad de su celular.', img: 'expedientes.jpg' },
            { t: 'Reportes de Conducta', d: ' busque reportes sobre el comportamiento y asistencia del alumno.', img: 'reportes.jpg' },
        ];
        for (let paso of pasosPadre) {
            await Swal.fire({ ...swalConfig, title: paso.t, html: `<img src="img/tutorial/${paso.img}" class="img-tutorial"><p>${paso.d}</p>` });
        }
    }

    // Paso Final: Personalización (Modo Oscuro)
    await Swal.fire({
        ...swalConfig,
        title: 'Personalización 🎨',
        html: `
            <img src="ajustes.jpg" class="img-tutorial">
            <p>Por último, recuerda que en <b>Ajustes</b> puedes  <b> cambiar tu contrseña, activar modo oscuro y mas</b> y revisar nuestro <b>Aviso de Privacidad</b>.</p>
        `
    });

    // Paso de Cierre
    await Swal.fire({
        ...swalConfig,
        title: '¡Todo listo! 🚀',
        text: 'Ya puedes empezar a explorar tu portal escolar.',
        icon: 'success',
        confirmButtonText: '¡Entrar al Portal!'
    });
}

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            if(email === "secundariageneral2moisesaenz@gmail.com" && pass === "secundariageneral120") {
                localStorage.setItem('role', 'admin');
                Swal.fire({ title: 'Acceso Admin', text: 'Bienvenido a la consola de dirección.', icon: 'success', timer: 1500, showConfirmButton: false });
                setTimeout(() => window.location.href = "inicio.html", 1500);
                return;
            }

            try {
                if (isLogin) {
                    const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                    const userDoc = await getDoc(doc(db, "users", userCredential.user.uid));
                    if (userDoc.exists()) {
                        localStorage.setItem('role', userDoc.data().rol);
                        window.location.href = "inicio.html";
                    }
                } else {
                    const role = document.getElementById('user-role').value;
                    const name = document.getElementById('fullname').value;
                    if(!name) return Swal.fire('Error', 'Escribe tu nombre completo', 'error');

                    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                    const user = userCredential.user;

                    const userData = {
                        nombre: name,
                        email: email,
                        rol: role,
                        createdAt: new Date()
                    };

                    if(role === 'alumno') {
                        userData.grado = document.getElementById('grado').value;
                        userData.grupo = document.getElementById('grupo').value.toUpperCase();
                    }

                    await setDoc(doc(db, "users", user.uid), userData);
                    localStorage.setItem('role', role);

                    // Solo mostramos el tutorial en el registro
                    await mostrarTutorial(role, name);
                    window.location.href = "inicio.html";
                }
            } catch (error) {
                Swal.fire('Error de acceso', 'Verifica que tu correo y contraseña sean correctos.', 'error');
            }
        });
    </script>
</body>
</html>
