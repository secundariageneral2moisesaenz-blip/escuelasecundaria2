<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subir Boletas | Moisés Sáenz #2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #004aad;
            --success: #22c55e;
            --error: #ef4444;
            --text: #1e293b;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #f1f5f9;
            --input-bg: #f8fafc;
        }

        /* Colores cuando el modo oscuro está activo */
        body.dark-mode {
            --bg: #0f172a;
            --text: #f1f5f9;
            --card: #1e293b;
            --border: #334155;
            --input-bg: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .upload-card {
            background: var(--card);
            width: 100%;
            max-width: 480px;
            padding: 35px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            position: relative;
            border: 1px solid var(--border);
            transition: background 0.3s, border 0.3s;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { margin: 10px 0 5px; color: var(--primary); font-weight: 800; font-size: 24px; }
        .header p { color: #64748b; font-size: 14px; margin: 0; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 800; margin-bottom: 8px; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 16px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }

        input[type="text"]:focus { border-color: var(--primary); background: var(--card); outline: none; }

        /* Estilo Drag & Drop */
        .drop-zone {
            width: 100%;
            height: 150px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            background: var(--input-bg);
            margin-bottom: 20px;
        }

        .drop-zone--over { border-color: var(--primary); background: rgba(0, 74, 173, 0.05); }
        .drop-zone__prompt { color: #64748b; font-size: 14px; font-weight: 600; }
        .drop-zone__thumb { font-size: 12px; color: var(--primary); font-weight: 700; margin-top: 10px; }

        .btn-upload {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 18px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s;
            box-shadow: 0 10px 15px -3px rgba(0, 74, 173, 0.3);
        }

        .btn-upload:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-upload:disabled { background: #94a3b8; transform: none; box-shadow: none; cursor: not-allowed; }

        #progress-container {
            display: none;
            margin-top: 25px;
            background: var(--border);
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--primary), #00c6ff);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            justify-content: center;
            width: 100%;
            margin-top: 25px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="upload-card">
        <div class="header">
            <div style="background: rgba(0, 74, 173, 0.1); width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                <i data-lucide="cloud-lightning" style="color: var(--primary);"></i>
            </div>
            <h2>Boletas Cloud</h2>
            <p>Portal de carga para personal administrativo</p>
        </div>

        <div class="form-group">
            <label>CURP del Estudiante</label>
            <input type="text" id="alumno-curp" placeholder="Ingrese 18 caracteres" maxlength="18" autocomplete="off">
        </div>

        <div class="drop-zone" id="drop-zone">
            <span class="drop-zone__prompt">Arrastra el PDF aquí o haz clic</span>
            <i data-lucide="file-text" style="margin-top: 10px; color: #94a3b8;"></i>
            <div id="file-name-display" class="drop-zone__thumb"></div>
            <input type="file" id="file-input" accept=".pdf" style="display: none;">
        </div>

        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <button class="btn-upload" id="upload-btn">
            <i data-lucide="upload-cloud"></i> Iniciar Carga
        </button>

        <a href="inicio.html" class="back-link">
            <i data-lucide="arrow-left" size="16"></i> Regresar al Panel
        </a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-trG4y0yS3ldkZwcOY0Ar-s_aCt1VE-8",
            authDomain: "escuelasecundariageneralno2.firebaseapp.com",
            projectId: "escuelasecundariageneralno2",
            storageBucket: "escuelasecundariageneralno2.firebasestorage.app",
            messagingSenderId: "755206365423",
            appId: "1:755206365423:web:81f6a2335a5ce8bfce3b1a"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getFirestore(app);
        lucide.createIcons();

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const curpInput = document.getElementById('alumno-curp');
        const uploadBtn = document.getElementById('upload-btn');
        const fileNameDisplay = document.getElementById('file-name-display');

        // Aplicar Tema al inicio
        function aplicarTemaGuardado() {
            const temaRecuperado = localStorage.getItem('theme');
            if (temaRecuperado === 'dark') {
                document.body.classList.add('dark-mode');
            }
        }
        aplicarTemaGuardado();

        // --- LÓGICA DE SELECCIÓN DE ARCHIVO ---
        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                updateThumbnail(fileInput.files[0]);
            }
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drop-zone--over');
        });

        ['dragleave', 'dragend'].forEach(type => {
            dropZone.addEventListener(type, () => dropZone.classList.remove('drop-zone--over'));
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                updateThumbnail(e.dataTransfer.files[0]);
            }
            dropZone.classList.remove('drop-zone--over');
        });

        function updateThumbnail(file) {
            fileNameDisplay.textContent = `Archivo: ${file.name}`;
            const nameNoExt = file.name.split('.')[0];
            if(nameNoExt.length === 18) {
                curpInput.value = nameNoExt.toUpperCase();
            }
        }

        // --- LÓGICA DE CARGA ---
        uploadBtn.addEventListener('click', async () => {
            const curp = curpInput.value.trim().toUpperCase();
            const file = fileInput.files[0];
            const progressBar = document.getElementById('progress-bar');
            const progressContainer = document.getElementById('progress-container');

            if (curp.length !== 18) {
                return Swal.fire('CURP Inválido', 'Debe tener exactamente 18 caracteres.', 'warning');
            }
            if (!file || file.type !== 'application/pdf') {
                return Swal.fire('Archivo requerido', 'Selecciona una boleta en formato PDF.', 'warning');
            }

            uploadBtn.disabled = true;
            progressContainer.style.display = 'block';

            try {
                const storageRef = ref(storage, `boletas/${curp}.pdf`);
                const uploadTask = uploadBytesResumable(storageRef, file);

                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        progressBar.style.width = progress + '%';
                    }, 
                    (error) => {
                        console.error(error);
                        Swal.fire('Error de Carga', 'No se pudo subir el archivo.', 'error');
                        uploadBtn.disabled = false;
                        progressContainer.style.display = 'none';
                    }, 
                    async () => {
                        const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);

                        await setDoc(doc(db, "boletas_registros", curp), {
                            curp: curp,
                            url: downloadURL,
                            subidoPor: localStorage.getItem('nombre') || 'Admin',
                            fecha: serverTimestamp() // Usar tiempo del servidor
                        });

                        Swal.fire({
                            title: '¡Boleta Lista!',
                            text: `El documento para ${curp} se subió correctamente.`,
                            icon: 'success',
                            confirmButtonColor: '#004aad'
                        });

                        // Reset de formulario
                        curpInput.value = '';
                        fileInput.value = '';
                        fileNameDisplay.textContent = '';
                        progressContainer.style.display = 'none';
                        progressBar.style.width = '0%';
                        uploadBtn.disabled = false;
                    }
                );
            } catch (err) {
                console.error(err);
                Swal.fire('Error Crítico', 'Ocurrió un error inesperado.', 'error');
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
